<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
	<description>Accept bitmap fonts</description>
	<selectfont>
		<acceptfont>
			<pattern>
				<!-- use `outline` instead of `scalable` because scalable can be true for color bitmap fonts
				https://gitlab.freedesktop.org/fontconfig/fontconfig/-/commit/7aa647eb9ee46d98b6172c16e9727aa2bd222627 -->
				<patelt name="outline"><bool>false</bool></patelt>
			</pattern>
		</acceptfont>
	</selectfont>
</fontconfig>
