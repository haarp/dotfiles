<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">

<!-- Emoji font fixes -->
<!-- https://github.com/googlefonts/noto-emoji/issues/36#issuecomment-1676486829 -->

<!-- test on:
	https://unicode.org/emoji/charts/full-emoji-list.html
	https://getemoji.com (most interesting: New Emojis sections)
	Xfwm4 titlebars, xfce4-panel window list
	Alacritty (start new window)
	xed -s
	notify-send test "wtf 😀😂🫠🫨👩‍👩‍👧‍👦🫸👎🏽 UTC-7⌚️"
-->

<!-- Broken:
	- Noto non-color Emoji: has many glyphs we don't want, e.g. numbers
	- Ripcord: breaks with Noto CE, works with Twemoji - https://dev.cancel.fm/tktview?name=acaddd470e
-->

<fontconfig>

<!-- Prefer `emoji` to override DejaVu's black emojis
`emoji` family is defined in 45-generic.conf -->
<match>
	<test name="family"><string>sans</string></test>
	<edit name="family" mode="prepend" binding="weak">
		<string>emoji</string>
	</edit>
</match>
<match>
	<test name="family"><string>serif</string></test>
	<edit name="family" mode="prepend" binding="weak">
		<string>emoji</string>
	</edit>
</match>
<match>
	<test name="family"><string>sans-serif</string></test>
	<edit name="family" mode="prepend" binding="weak">
		<string>emoji</string>
	</edit>
</match>
<!--<match>
	<test name="family"><string>monospace</string></test>
	<edit name="family" mode="prepend" binding="weak">
		<string>emoji</string>
	</edit>
</match>-->

</fontconfig>
